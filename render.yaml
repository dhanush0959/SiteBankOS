services:
  - type: redis
    name: sitebank-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Allow only Render internal traffic

  - type: web
    name: sitebank-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: NODE_VERSION
        value: "20.11.0"
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_jnXH54KlyfUZ@ep-muddy-bar-atw5empn.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require"
      - key: REDIS_URL
        fromService:
          type: redis
          name: sitebank-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://site-bank2-website.vercel.app
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: FEATURE_EMAIL
        value: "false"
      - key: FEATURE_PAYMENTS
        value: "false"
      - key: FEATURE_WHATSAPP
        value: "false"
