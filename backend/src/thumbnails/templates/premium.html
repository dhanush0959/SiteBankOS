<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }

  .poster {
    position: relative;
    width: 100%;
    height: 100%;
    background: #1a1a2e;
    overflow: hidden;
  }

  .bg-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(0,0,0,0.85) 0%,
      rgba(0,0,0,0.45) 40%,
      rgba(0,0,0,0.15) 70%,
      rgba(0,0,0,0.05) 100%
    );
  }

  .badge {
    position: absolute;
    top: 32px;
    left: 48px;
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white;
    font-size: 14px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 100px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 48px 56px 40px 56px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .headline {
    font-size: 44px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.15;
    max-width: 900px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .price {
    font-size: 52px;
    font-weight: 800;
    color: #f97316;
    line-height: 1;
  }

  .price-label {
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .location {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    color: rgba(255,255,255,0.85);
  }

  .specs {
    font-size: 18px;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: #f97316;
    border-radius: 2px;
    margin: 4px 0;
  }

  .cta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }

  .cta {
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    background: #f97316;
    padding: 14px 32px;
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .agency-logo {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    object-fit: contain;
    background: white;
    padding: 4px;
  }

  .branding {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="poster">
  <img class="bg-image" src="{{coverUrl}}" alt="" crossorigin="anonymous" />
  <div class="overlay"></div>

  <div class="badge">Premium Property</div>

  <div class="content">
    <div class="headline">{{headline}}</div>

    <div class="price-row">
      <span class="price">{{price}}</span>
      <span class="price-label">{{priceLabel}}</span>
    </div>

    <div class="location">📍 {{location}}</div>

    <div class="specs">{{keySpec}}</div>

    <div class="divider"></div>

    <div class="cta-row">
      <span class="cta">📞 {{ctaText}}</span>
      <div class="logo-area">
        <span class="branding">{{brandingText}}</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
