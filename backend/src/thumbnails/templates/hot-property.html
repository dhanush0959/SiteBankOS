<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }

  .poster {
    position: relative;
    width: 100%;
    height: 100%;
    background: #0f0f0f;
    overflow: hidden;
  }

  .bg-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.3) 0%,
      rgba(0,0,0,0.5) 40%,
      rgba(0,0,0,0.8) 100%
    );
  }

  .hot-banner {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    background: linear-gradient(90deg, #dc2626, #f97316);
    padding: 16px 40px;
    text-align: center;
  }

  .hot-banner-text {
    font-size: 22px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 56px 52px 48px 52px;
  }

  .headline {
    font-size: 58px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.1;
    margin-bottom: 16px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.6);
  }

  .price-section {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
  }

  .price {
    font-size: 64px;
    font-weight: 900;
    color: #f97316;
    line-height: 1;
  }

  .negotiable-tag {
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    background: rgba(220,38,38,0.9);
    padding: 6px 16px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .specs-row {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
  }

  .spec-chip {
    font-size: 20px;
    font-weight: 600;
    color: #ffffff;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    padding: 8px 18px;
    border-radius: 100px;
  }

  .location {
    font-size: 22px;
    color: rgba(255,255,255,0.85);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .urgency {
    font-size: 20px;
    font-weight: 700;
    color: #fbbf24;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cta-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cta {
    font-size: 24px;
    font-weight: 800;
    color: #ffffff;
    background: linear-gradient(135deg, #dc2626, #f97316);
    padding: 18px 40px;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 20px rgba(220,38,38,0.4);
  }

  .branding {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="poster">
  <img class="bg-image" src="{{coverUrl}}" alt="" crossorigin="anonymous" />
  <div class="overlay"></div>

  <div class="hot-banner">
    <span class="hot-banner-text">🔥 Hot Property</span>
  </div>

  <div class="content">
    <div class="headline">{{headline}}</div>

    <div class="price-section">
      <span class="price">{{price}}</span>
      <span class="negotiable-tag">Negotiable</span>
    </div>

    <div class="specs-row">{{specChips}}</div>

    <div class="location">📍 {{location}}</div>

    <div class="urgency">⚡ {{urgencyText}}</div>

    <div class="cta-section">
      <span class="cta">🏠 {{ctaText}}</span>
      <span class="branding">{{brandingText}}</span>
    </div>
  </div>
</div>
</body>
</html>
