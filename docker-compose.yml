services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sitebank
      POSTGRES_PASSWORD: sitebank
      POSTGRES_DB: sitebank
    ports: ["5433:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitebank -d sitebank"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sitebank
      MINIO_ROOT_PASSWORD: sitebank-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://sitebank:sitebank@postgres:5432/sitebank?schema=public
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:?required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?required}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-sitebank}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-sitebank-dev-secret}
      S3_BUCKET: ${S3_BUCKET:-sitebank}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports: ["4000:4000"]

  web:
    build:
      context: .
      dockerfile: frontend/website/Dockerfile
    restart: unless-stopped
    depends_on: [api]
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports: ["3000:3000"]

volumes:
  pg_data:
  redis_data:
  minio_data:
